<body>

<div id="Header"></div>
<div id="Container" class="main-page">
    <div id="Body">
        <div id="MainContent">
            <div class="error-message" id="NotFound"></div>
        </div>
    </div>
</div>
<div id="FooterWrapper">
    <div id="Footer"></div>
</div>

<script>
    const path = window.location.pathname;
    if (path.startsWith('/users/')) {
        const username = path.split('/users/')[1].replace(/\/$/, '');
        if (username) window.location.replace('/Pages/Profile/?u=' + encodeURIComponent(username));
    }
</script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/js/config.js"></script>
</body>
