<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex">
    <title>Reset Password - CAP Central</title><script>document.title = SITE_CONFIG.ui.pageTitles.reset + ' - ' + SITE_CONFIG.siteName;</script>
    <link rel="icon" href="/assets/img/FaviIcon.ico" type="image/x-icon">
    <link rel="stylesheet" href="/assets/css/style.css">
    <style>
        .reset-success { text-align:center;padding:30px; }
        .reset-success h2 { margin:0 0 8px; }
        .reset-success p  { font-size:12px;color:#778;margin:0; }
    </style>
</head>
<body>
<div id="MainContainer">

    <div id="HeaderWrapper"><div id="Header"></div></div>
    <div id="Container">
    <div id="Body">
        <div id="MainContent">
            <div class="FormPage">
            <div class="FormCard" id="RequestCard">
                <div class="box-header"><h2>Reset Password</h2></div>
                <div class="box-body">
                    <div class="form-group">
                        <label for="resetEmail">Email</label>
                        <input type="email" id="resetEmail" placeholder="you@gmail.com" autocomplete="off" />
                        <p class="field-hint">We'll send a password reset link to this email.</p>
                    </div>
                    <button id="RequestBtn" onclick="handleRequestReset()"><img src="/assets/img/icons/email_go.png" width="14" height="14" alt="" style="vertical-align:middle;"> Send Reset Link</button>
                    <div id="RequestStatus"></div>
                </div>
                <div class="form-footer">
                    <a href="/Pages/Login/">Back to Login</a>
                </div>
            </div>

            <div class="FormCard" id="ResetCard" style="display:none;">
                <div class="box-header"><h2>Set New Password</h2></div>
                <div class="box-body">
                    <div class="form-group">
                        <label for="newPassword">New Password</label>
                        <input type="password" id="newPassword" placeholder="Min. 6 characters" autocomplete="new-password" />
                    </div>
                    <div class="form-group">
                        <label for="confirmPassword">Confirm Password</label>
                        <input type="password" id="confirmPassword" placeholder="Repeat your password" autocomplete="new-password" />
                    </div>
                    <button id="ResetBtn" onclick="handleResetPassword()"><img src="/assets/img/icons/key.png" width="14" height="14" alt="" style="vertical-align:middle;"> Update Password</button>
                    <div id="ResetStatus"></div>
                </div>
            </div>
        </div>
    </div>
</div>
</div>
    <div id="FooterWrapper">
    <div id="Footer"></div>
</div>

<!-- Capture hash before Supabase clears it -->
<script>window._rcapHash = window.location.hash;</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/assets/js/config.js"></script>
<script>
// Check URL hash BEFORE Supabase clears it (captured via _rcapHash above)
const _hasRecoveryHash = window._rcapHash && window._rcapHash.includes('type=recovery');

function setStatus(el, msg, type) {
    el.textContent = msg;
    el.className = type || '';
}

document.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    const card = document.activeElement?.closest('.FormCard');
    if (!card) return;
    if (card.id === 'RequestCard') handleRequestReset();
    else if (card.id === 'ResetCard') handleResetPassword();
});

// ---- DETECT RECOVERY ON LOAD ----
document.addEventListener('DOMContentLoaded', () => {
    if (_hasRecoveryHash) showResetCard();
});

// Listen for auth state changes (fires when Supabase processes URL hash)
sb.auth.onAuthStateChange((event) => {
    if (event === 'PASSWORD_RECOVERY') {
        showResetCard();
    }
});

function showResetCard() {
    const requestCard = document.getElementById('RequestCard');
    const resetCard = document.getElementById('ResetCard');
    if (requestCard) requestCard.style.display = 'none';
    if (resetCard) resetCard.style.display = 'block';
}

// ---- REQUEST RESET ----
async function handleRequestReset() {
    const email = document.getElementById('resetEmail').value.trim();
    const btn   = document.getElementById('RequestBtn');
    const st    = document.getElementById('RequestStatus');

    setStatus(st, '');
    if (!email) return setStatus(st, 'Enter your email address.', 'error');

    btn.disabled = true;
    setStatus(st, 'Sending...', '');

    const { error } = await sb.auth.resetPasswordForEmail(email, {
        redirectTo: SITE_CONFIG.siteUrl + '/Pages/ResetPassword/',
    });

    if (error) { btn.disabled = false; return setStatus(st, error.message, 'error'); }

    setStatus(st, 'Check your email for the reset link. You can close this page.', 'success');
}

// ---- CONFIRM RESET ----
async function handleResetPassword() {
    const password = document.getElementById('newPassword').value;
    const confirm  = document.getElementById('confirmPassword').value;
    const btn      = document.getElementById('ResetBtn');
    const st       = document.getElementById('ResetStatus');

    setStatus(st, '');
    if (!password || !confirm) return setStatus(st, 'Fill in both fields.', 'error');
    if (password.length < 6) return setStatus(st, 'Password must be at least 6 characters.', 'error');
    if (password !== confirm) return setStatus(st, 'Passwords do not match.', 'error');

    btn.disabled = true;
    setStatus(st, 'Updating...', '');

    const { error } = await sb.auth.updateUser({ password });

    if (error) { btn.disabled = false; return setStatus(st, error.message, 'error'); }

    // Sign out and redirect to login
    await sb.auth.signOut();
    setStatus(st, 'Password updated! Redirecting to login...', 'success');
    setTimeout(() => window.location.href = '/Pages/Login/', 1500);
}
</script>
</div>
</body>
</html>
