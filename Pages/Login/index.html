<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Log In - CAP Central</title>
<link rel="icon" href="/assets/img/FaviIcon.ico" type="image/x-icon">
<link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>

<div id="Container">
    <div id="Header"></div>

    <div id="Body">
        <div class="FormPage">
            <div class="FormCard">
                <div class="box-header"><h2>Member Login</h2></div>
                <div class="box-body">
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" placeholder="you@example.com" autocomplete="off" />
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="Your password" />
                        <p class="field-hint"><a href="/ForgotPassword/">Forgot your password?</a></p>
                    </div>
                    <button id="LoginBtn" onclick="handleLogin()">Sign In</button>
                    <div id="StatusMsg"></div>
                    <div class="form-footer">
                        Not a member? <a href="/Signup/">Sign Up</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="FooterWrapper">
    <div id="Footer"></div>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="/assets/js/config.js"></script>
<script>
function setStatus(msg, type) {
    const el = document.getElementById('StatusMsg');
    el.textContent = msg; el.className = type;
}

async function handleLogin() {
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn      = document.getElementById('LoginBtn');

    setStatus('', '');
    if (!email || !password) return setStatus('Please fill in all fields.', 'error');

    btn.disabled = true;
    setStatus('Signing in...', '');

    const { error } = await sb.auth.signInWithPassword({ email, password });
    if (error) {
        btn.disabled = false;
        return setStatus(error.message, 'error');
    }

    setStatus('Logged in! Redirecting...', 'success');
    setTimeout(() => window.location.href = '/', 800);
}
</script>
</body>
</html>
