<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Home - CAP Central</title>
    <link rel="icon" href="assets/img/FaviIcon.ico" type="image/x-icon">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        /* Logged-out browse CTA strip */
        #BrowseStrip {
            background: var(--c-accent);
            color: #fff;
            text-align: center;
            padding: 10px 20px;
            font-size: 12px;
            border-bottom: 1px solid var(--c-accent-hover);
            display: none;
        }

        #BrowseStrip a {
            color: #fff;
            font-weight: bold;
            text-decoration: underline;
            margin-left: 8px;
        }

        #BrowseStrip a:hover { color: #ddeeff; }

        /* Make the active nav item obvious */
        #Navigation a.MenuItem.Active {
            border-bottom: 2px solid var(--c-accent);
        }

        /* Quicklinks below splash for logged out users */
        .quicklinks {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            flex-wrap: wrap;
        }

        .quicklink-btn {
            display: inline-block;
            padding: 5px 14px;
            font-size: 11px;
            font-weight: bold;
            border-radius: 2px;
            text-decoration: none;
            border: 1px solid;
        }

        .quicklink-btn.primary {
            background: var(--c-accent);
            color: #fff;
            border-color: var(--c-accent-hover);
        }

        .quicklink-btn.primary:hover {
            background: var(--c-accent-hover);
            text-decoration: none;
            color: #fff;
        }

        .quicklink-btn.secondary {
            background: var(--c-cat-bg);
            color: var(--c-cat-text);
            border-color: var(--c-cat-border);
        }

        .quicklink-btn.secondary:hover {
            background: #d8e0f0;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div id="Header"></div>
    <div id="Container" class="main-page">
        <div id="Body">
            <div id="MainContent">
                <div id="BrowseStrip">
                    You don't need an account to browse packs.
                    <a href="/Pages/Packs/">Browse Packs &rarr;</a>
                </div>
                <div id="SplashSection"></div>
                <div id="StatsSection"></div>
                <div id="RecentSection"></div>
            </div>
        </div>
    </div>
    <div id="FooterWrapper">
        <div id="Footer"></div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/js/config.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', () => {
        setTimeout(async () => {
            const { data: { session } } = await sb.auth.getSession();

            let username = null;
            if (session) {
                const { data: profile } = await sb
                    .from('profiles')
                    .select('username')
                    .eq('id', session.user.id)
                    .maybeSingle();
                username = profile?.username || null;
            }

            buildSplash(username);
            buildStats();
            buildRecent();
        }, 150);
    });

    function buildSplash(username) {
        const splash = document.getElementById('SplashSection');

        if (username) {
            // Logged in — show welcome + search
            splash.innerHTML = `
                <div id="SplashLeft">
                    <img id="SplashLogo" src="${SITE_CONFIG.splashLogoImg}" alt="${SITE_CONFIG.siteName}">
                    <div id="SplashBlurb">
                        <h2>Welcome back, ${esc(username)}!</h2>
                        <p>${SITE_CONFIG.home.blurbText}</p>
                    </div>
                    <div class="quicklinks">
                        <a href="/Pages/Packs/" class="quicklink-btn primary">Browse Packs</a>
                        <a href="/Pages/Submit/" class="quicklink-btn secondary">Submit a Pack</a>
                        <a href="/Pages/Profile/?u=${encodeURIComponent(username)}" class="quicklink-btn secondary">My Profile</a>
                    </div>
                </div>
                <div id="SignInArea">
                    <div id="SignupBox">
                        <div class="box-header"><h3>Search Packs</h3></div>
                        <div class="box-body">
                            <div class="form-group">
                                <label for="HomeSearch">Pack name or author</label>
                                <input type="text" id="HomeSearch" placeholder="e.g. 2009 terrain..." autocomplete="off">
                            </div>
                            <div class="form-group">
                                <label for="HomeCategory">Category</label>
                                <select id="HomeCategory">
                                    <option value="">All categories</option>
                                </select>
                            </div>
                            <button onclick="handleHomeSearch()">Search</button>
                            <div style="margin-top:8px;text-align:center;font-size:11px;">
                                <a href="/Pages/Packs/">Browse all packs &rarr;</a>
                            </div>
                        </div>
                        <div class="box-footer">
                            <a href="/Pages/Submit/">Submit your own pack</a>
                        </div>
                    </div>
                </div>
            `;
        } else {
            // Logged out — show browse strip, signup form, and browse CTA
            document.getElementById('BrowseStrip').style.display = 'block';

            splash.innerHTML = `
                <div id="SplashLeft">
                    <img id="SplashLogo" src="${SITE_CONFIG.splashLogoImg}" alt="${SITE_CONFIG.siteName}">
                    <div id="SplashBlurb">
                        <h2>${SITE_CONFIG.home.slogan}</h2>
                        <p>${SITE_CONFIG.home.blurbText}</p>
                    </div>
                    <div class="quicklinks">
                        <a href="/Pages/Packs/" class="quicklink-btn primary">Browse Packs</a>
                        <a href="/Pages/Plugins/" class="quicklink-btn secondary">Browse Plugins</a>
                    </div>
                </div>
                <div id="SignInArea">
                    <div id="SignupBox">
                        <div class="box-header"><h3>${SITE_CONFIG.home.signupTitle}</h3></div>
                        <div class="box-body">
                            <div class="form-group">
                                <label>Username</label>
                                <input id="hw_username" type="text" placeholder="${SITE_CONFIG.home.usernamePh}" maxlength="24" autocomplete="off">
                            </div>
                            <div class="form-group">
                                <label>Email</label>
                                <input id="hw_email" type="email" placeholder="${SITE_CONFIG.home.emailPh}" autocomplete="off">
                            </div>
                            <div class="form-group">
                                <label>Password</label>
                                <input id="hw_password" type="password" placeholder="${SITE_CONFIG.home.passwordPh}">
                            </div>
                            <button onclick="handleHomeSignup()">${SITE_CONFIG.home.signupBtn}</button>
                            <div id="hw_status"></div>
                        </div>
                        <div class="box-footer">
                            <a href="/Pages/Login/">${SITE_CONFIG.home.loginLink}</a>
                        </div>
                    </div>
                </div>
            `;
        }

        loadCategories();
    }

    async function loadCategories() {
        const sel = document.getElementById('HomeCategory');
        if (!sel) return;
        const { data } = await sb.from('packs').select('category');
        if (!data) return;
        const cats = [...new Set(data.map(p => p.category || 'Other').filter(Boolean))].sort();
        cats.forEach(cat => {
            const o = document.createElement('option');
            o.value = cat; o.textContent = cat;
            sel.appendChild(o);
        });
    }

    function handleHomeSearch() {
        const query    = document.getElementById('HomeSearch')?.value.trim() || '';
        const category = document.getElementById('HomeCategory')?.value || '';
        const params   = new URLSearchParams();
        if (query)    params.set('search', query);
        if (category) params.set('category', category);
        window.location.href = '/Pages/Packs/?' + params.toString();
    }

    document.addEventListener('keydown', e => {
        if (e.key === 'Enter' && document.activeElement?.id === 'HomeSearch') handleHomeSearch();
        if (e.key === 'Enter' && document.activeElement?.closest('#SignupBox')) handleHomeSignup();
    });

    async function buildStats() {
        const section = document.getElementById('StatsSection');
        const { count: packCount }  = await sb.from('packs').select('*', { count: 'exact', head: true });
        const { data: dlData }      = await sb.from('packs').select('downloads');
        const { count: userCount }  = await sb.from('profiles').select('*', { count: 'exact', head: true });
        const totalDl = dlData ? dlData.reduce((s, p) => s + (p.downloads || 0), 0) : 0;

        section.innerHTML = `
            <div id="StatsBar" style="margin:0;">
                <div class="stat-card">
                    <div class="stat-number">${packCount ?? '—'}</div>
                    <div class="stat-label">Packs Available</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${totalDl.toLocaleString()}</div>
                    <div class="stat-label">Total Downloads</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${userCount ?? '—'}</div>
                    <div class="stat-label">Members</div>
                </div>
            </div>
        `;
    }

    async function buildRecent() {
        const section = document.getElementById('RecentSection');
        const { data: packs } = await sb
            .from('packs')
            .select('*')
            .order('created_at', { ascending: false })
            .limit(3);

        if (!packs || packs.length === 0) return;

        section.innerHTML = `
            <div style="padding:20 0px 20px;">
                <div class="CatHeader">
                    <h3>Recently Added</h3>
                    <a href="/Pages/Packs/">View all &rarr;</a>
                </div>
                <div class="PackGrid" id="RecentGrid" style="margin-top:0;border:1px solid var(--c-cat-border);border-top:none;padding:12px;background:#fff;border-radius:0 0 2px 2px;"></div>
            </div>
        `;

        const grid = document.getElementById('RecentGrid');
        packs.forEach(pack => {
            const div = document.createElement('div');
            div.className = 'PackItem';
            const dl = pack.downloads || 0;
            div.innerHTML = `
                <div class="PackContentGroup">
                    <img class="PackIcon" src="${esc(pack.icon||'/assets/img/Placeholder.png')}" alt="${esc(pack.title)}" loading="lazy" onerror="this.src='/assets/img/Placeholder.png'">
                    <div class="PackTitle">${esc(pack.title)}</div>
                    <div class="PackAuthor">by ${esc(pack.author)}</div>
                    <div class="PackCategory">${esc(pack.category||'Other')}</div>
                    <div style="font-size:10px;color:#889;margin-top:2px;">${dl} download${dl !== 1 ? 's' : ''}</div>
                </div>
                <div class="PackButtons">
                    <a href="${esc(pack.download_url||'#')}" target="_blank" rel="noopener noreferrer" class="PackDownload">Download</a>
                    <a href="/Pages/Packs/" class="pack-browse-btn" style="flex:1;font-size:10px;padding:3px 6px;font-weight:bold;background:var(--c-cat-bg);border:1px solid var(--c-border-dark);cursor:pointer;font-family:inherit;color:var(--c-cat-text);border-radius:2px;display:inline-flex;align-items:center;justify-content:center;text-decoration:none;">Browse More</a>
                </div>
            `;
            grid.appendChild(div);
        });
    }

    function esc(t) {
        if (!t) return '';
        const d = document.createElement('div');
        d.textContent = t; return d.innerHTML;
    }
    </script>
</body>
</html>
