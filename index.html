<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Home - CAP Central</title>
    <script>document.title = SITE_CONFIG.ui.pageTitles.home + ' - ' + SITE_CONFIG.siteName;</script>
    <link rel="icon" href="assets/img/FaviIcon.ico" type="image/x-icon">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        #BrowseStrip {
            background: var(--c-nav-bg);
            color: var(--c-nav-text);
            text-align: center;
            padding: 8px 20px;
            font-size: 12px;
            display: none;
        }

        #BrowseStrip a {
            color: #fff;
            font-weight: 600;
            text-decoration: underline;
            margin-left: 6px;
        }

        #BrowseStrip a:hover { color: #8ab8f0; }

        .quicklinks {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            flex-wrap: wrap;
        }

        .quicklink-btn {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 5px 14px;
            font-size: 11px;
            font-weight: 600;
            text-decoration: none;
            border: 1px solid;
        }

        .quicklink-btn.primary {
            background: var(--c-green);
            color: #fff !important;
            border-color: var(--c-green-border);
        }

        .quicklink-btn.primary:hover {
            background: var(--c-green-hover);
            text-decoration: none !important;
            color: #fff;
        }

        .quicklink-btn.secondary {
            background: var(--c-btn);
            color: #333 !important;
            border-color: var(--c-btn-border);
        }

        .quicklink-btn.secondary:hover {
            background: var(--c-btn-hover);
            text-decoration: none !important;
        }
    </style>
</head>
<body>
<div id="MainContainer">

    <div id="HeaderWrapper"><div id="Header"></div></div>
    <div id="Container" class="main-page">
    <div id="Body">
        <div id="MainContent">
            <div id="BrowseStrip">
                    You don't need an account to browse packs.
                    <a href="/Pages/Packs/">Browse Packs &rarr;</a>
                </div>
                <div id="SplashSection"></div>
                <div id="StatsSection"></div>
                <div id="RecentSection"></div>
            </div>
        </div>
    </div>
    <div id="FooterWrapper">
        <div id="Footer"></div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/js/config.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', () => {
        setTimeout(async () => {
            const { data: { session } } = await sb.auth.getSession();

            let username = null;
            if (session) {
                const { data: profile } = await sb
                    .from('profiles')
                    .select('username')
                    .eq('id', session.user.id)
                    .maybeSingle();
                username = profile?.username || null;
            }

            buildSplash(username);
            buildStats();
            buildRecent();
        }, 150);
    });

    function buildSplash(username) {
        const splash = document.getElementById('SplashSection');

        if (username) {
            // Logged in — show welcome + dashboard
            splash.innerHTML = `
                <div id="SplashLeft">
                    <img id="SplashLogo" src="${SITE_CONFIG.splashLogoImg}" alt="${SITE_CONFIG.siteName}">
                    <div id="SplashBlurb">
                        <h2>Welcome back, ${esc(username)}!</h2>
                        <p>${SITE_CONFIG.home.blurbText}</p>
                    </div>
                    <div class="quicklinks">
                        <a href="/Pages/Packs/" class="quicklink-btn primary"><img src="/assets/img/icons/package.png" width="16" height="16" alt=""> Browse Packs</a>
                        <a href="/Pages/Submit/" class="quicklink-btn secondary"><img src="/assets/img/icons/page_white_add.png" width="16" height="16" alt=""> Submit a Pack</a>
                        <a href="/Pages/Profile/?u=${encodeURIComponent(username)}" class="quicklink-btn secondary"><img src="/assets/img/icons/user.png" width="16" height="16" alt=""> My Profile</a>
                    </div>
                </div>
                <div id="SignInArea">
                    <div id="SignupBox">
                        <div class="box-header"><h3>Your Dashboard</h3></div>
                        <div class="box-body">
                            <div style="font-size:12px;color:#555;margin-bottom:10px;line-height:1.5;" id="DashInfo">Loading...</div>
                            <div style="display:flex;gap:6px;flex-wrap:wrap;">
                                <a href="/Pages/Settings/" class="quicklink-btn secondary" style="flex:1;text-align:center;font-size:10px;"><img src="/assets/img/icons/wrench.png" width="14" height="14" alt="" style="vertical-align:middle;"> Settings</a>
                                <a href="/Pages/Submit/" class="quicklink-btn primary" style="flex:1;text-align:center;font-size:10px;"><img src="/assets/img/icons/page_white_add.png" width="14" height="14" alt="" style="vertical-align:middle;"> New Submission</a>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            loadDashStats(username);
        } else {
            // Logged out — show browse strip, signup form, and browse CTA
            document.getElementById('BrowseStrip').style.display = 'block';

            splash.innerHTML = `
                <div id="SplashLeft">
                    <img id="SplashLogo" src="${SITE_CONFIG.splashLogoImg}" alt="${SITE_CONFIG.siteName}">
                    <div id="SplashBlurb">
                        <h2>${SITE_CONFIG.home.slogan}</h2>
                        <p>${SITE_CONFIG.home.blurbText}</p>
                    </div>
                    <div class="quicklinks">
                        <a href="/Pages/Packs/" class="quicklink-btn primary"><img src="/assets/img/icons/package.png" width="16" height="16" alt=""> Browse Packs</a>
                        <a href="/Pages/Plugins/" class="quicklink-btn secondary"><img src="/assets/img/icons/plugin.png" width="16" height="16" alt=""> Browse Plugins</a>
                    </div>
                </div>
                <div id="SignInArea">
                    <div id="SignupBox">
                        <div class="box-header"><h3>${SITE_CONFIG.home.signupTitle}</h3></div>
                        <div class="box-body">
                            <div class="form-group">
                                <label>Username</label>
                                <input id="hw_username" type="text" placeholder="${SITE_CONFIG.home.usernamePh}" maxlength="24" autocomplete="off">
                            </div>
                            <div class="form-group">
                                <label>Email</label>
                                <input id="hw_email" type="email" placeholder="${SITE_CONFIG.home.emailPh}" autocomplete="off">
                            </div>
                            <div class="form-group">
                                <label>Password</label>
                                <input id="hw_password" type="password" placeholder="${SITE_CONFIG.home.passwordPh}">
                            </div>
                            <button onclick="handleHomeSignup()" style="display:inline-flex;align-items:center;gap:4px;justify-content:center;padding:6px 20px;font-size:12px;font-family:var(--font);background:var(--c-green);color:#fff;border:1px solid var(--c-green-border);cursor:pointer;margin-top:6px;"><img src="/assets/img/icons/user_add.png" width="14" height="14" alt="" style="vertical-align:middle;"> ${SITE_CONFIG.home.signupBtn}</button>
                            <div id="hw_status"></div>
                        </div>
                        <div class="box-footer">
                            <a href="/Pages/Login/">${SITE_CONFIG.home.loginLink}</a>
                        </div>
                    </div>
                </div>
            `;
        }

        loadCategories();
    }

    async function loadCategories() {
        const sel = document.getElementById('HomeCategory');
        if (!sel) return;
        const { data } = await sb.from('packs').select('category');
        if (!data) return;
        const cats = [...new Set(data.map(p => p.category || 'Other').filter(Boolean))].sort();
        cats.forEach(cat => {
            const o = document.createElement('option');
            o.value = cat; o.textContent = cat;
            sel.appendChild(o);
        });
    }

    async function loadDashStats(username) {
        const el = document.getElementById('DashInfo');
        if (!el) return;
        const { data: { session } } = await sb.auth.getSession();
        if (!session) { el.textContent = 'Could not load stats.'; return; }
        const { data: profile } = await sb.from('profiles').select('id').eq('username', username).maybeSingle();
        if (!profile) { el.textContent = 'Could not load stats.'; return; }
        const { count: packCount } = await sb.from('packs').select('*', { count: 'exact', head: true }).eq('submitted_by', username);
        const { count: subCount }  = await sb.from('submissions').select('*', { count: 'exact', head: true }).eq('submitted_by', username);
        el.innerHTML = `You've submitted <strong>${packCount ?? 0}</strong> pack${packCount !== 1 ? 's' : ''}${subCount > 0 ? ` and have <strong>${subCount}</strong> submission${subCount !== 1 ? 's' : ''} pending review.` : '.'}`;
    }

    document.addEventListener('keydown', e => {
        if (e.key === 'Enter' && document.activeElement?.closest('#SignupBox')) handleHomeSignup();
    });

    async function buildStats() {
        const section = document.getElementById('StatsSection');
        const { count: packCount }  = await sb.from('packs').select('*', { count: 'exact', head: true });
        const { count: userCount }  = await sb.from('profiles').select('*', { count: 'exact', head: true });

        section.innerHTML = `
            <div id="StatsBar" style="margin:0;">
                <div class="stat-card">
                    <div class="stat-number">${packCount ?? '—'}</div>
                    <div class="stat-label">Packs Available</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${userCount ?? '—'}</div>
                    <div class="stat-label">Members</div>
                </div>
            </div>
        `;
    }

    async function buildRecent() {
        const section = document.getElementById('RecentSection');
        const { data: packs } = await sb
            .from('packs')
            .select('*')
            .order('created_at', { ascending: false })
            .limit(3);

        if (!packs || packs.length === 0) return;

        section.innerHTML = `
            <div style="padding:20px 0 20px 0;">
                <div class="CatHeader">
                    <h3>Recently Added</h3>
                    <a href="/Pages/Packs/">View all &rarr;</a>
                </div>
                <div class="PackGrid" id="RecentGrid" style="margin-top:0;border:1px solid var(--c-cat-border);border-top:none;padding:12px;background:#fff;border-radius:0 0 2px 2px;"></div>
            </div>
        `;

        const grid = document.getElementById('RecentGrid');
        packs.forEach(pack => {
            const div = document.createElement('div');
            div.className = 'PackItem';
            div.innerHTML = `
                <div class="PackContentGroup">
                    <img class="PackIcon" src="${esc(pack.icon||'/assets/img/Placeholder.png')}" alt="${esc(pack.title)}" loading="lazy" onerror="this.src='/assets/img/Placeholder.png'">
                    <div class="PackTitle">${esc(pack.title)}</div>
                    <div class="PackAuthor">by ${esc(pack.author)}</div>
                    <div class="PackCategory">${esc(pack.category||'Other')}</div>
                </div>
                <div class="PackButtons">
                    <a href="${sanitizeUrl(pack.download_url)||'#'}" target="_blank" rel="noopener noreferrer" class="PackDownload"><img src="/assets/img/icons/disk.png" width="14" height="14" alt=""> Download</a>
                    <a href="/Pages/Packs/" class="PackSeeMore" style="flex:1;display:inline-flex;align-items:center;gap:4px;justify-content:center;font-size:11px;padding:4px 8px;font-weight:400;background:var(--c-btn);border:1px solid var(--c-btn-border);font-family:var(--font);color:#333;text-decoration:none;"><img src="/assets/img/icons/package.png" width="14" height="14" alt=""> Browse More</a>
                </div>
            `;
            grid.appendChild(div);
        });
    }

    function esc(t) {
        if (!t) return '';
        const d = document.createElement('div');
        d.textContent = t; return d.innerHTML;
    }
    </script>
</div>
</body>
</html>
